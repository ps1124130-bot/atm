<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATM 128 | Welcome</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    background:url("oip.jpg") no-repeat center center fixed;
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card-box{
    width:450px;
    background:url("oip.jpg") no-repeat center center fixed;
    border-radius:20px;
    padding:35px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,.4);
    animation:fade 1s;
}

.logo{
    width:90px;
    margin-bottom:15px;
}

h2{
    color:#003366;
    font-weight:bold;
}

.line{
    width:100%;
    height:2px;
    background:#ddd;
    margin:20px 0;
}

.time{
    font-size:20px;
    color:#0d6efd;
    font-weight:bold;
}

.date{
    font-size:17px;
    margin-bottom:20px;
}

.card-img{
    width:180px;
    margin:15px 0;
    animation:float 2s infinite ease-in-out;
}

.btn-atm{
    width:100%;
    font-size:20px;
    padding:12px;
}

.footer{
    margin-top:20px;
    color:gray;
    font-size:14px;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

@keyframes fade{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>

</head>

<body>

<div class="card-box">

<img src="https://images.seeklogo.com/logo-png/55/2/sbi-card-logo-png_seeklogo-556510.png"
class="logo">

<h2>STATE BANK OF INDIA</h2>

<p class="text-muted">Welcome to ATM 128</p>

<div class="line"></div>

<div class="time" id="clock"></div>

<div class="date" id="today"></div>

<img src="https://cdn-icons-png.flaticon.com/512/3062/3062634.png"
class="card-img">

<p>Please insert your ATM Card to continue.</p>

<a href="sbi.html" class="btn btn-primary btn-atm">
Insert Card
</a>

<div class="footer">
24×7 Banking Service
</div>

</div>

<script>

function updateTime(){

const now=new Date();

document.getElementById("clock").innerHTML=
now.toLocaleTimeString();

document.getElementById("today").innerHTML=
now.toDateString();

}

setInterval(updateTime,1000);

updateTime();

</script>

</body>
</html>
