<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATM Simulator</title>

<style>

body{
    margin:0;
    padding:0;
    background:#0d1117;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.atm{
    width:420px;
    background:#222;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 20px black;
}

.screen{
    background:#bfffc2;
    height:420px;
    border-radius:10px;
    padding:20px;
    overflow:auto;
}

button{

width:100%;
padding:15px;
margin-top:10px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:8px;
background:#0077ff;
color:white;
transition:.3s;

}

button:hover{
background:#005ad6;
}

input{

width:100%;
padding:12px;
font-size:18px;
margin-top:15px;

}

h2,p{
text-align:center;
}

</style>

</head>

<body style="background-image: url('oip.jpg'); background-size: cover; background-repeat: no-repeat; background-attachment: fixed;">

<div class="atm">

<div id="screen" class="screen">

</div>

</div>

<script>

let balance=25000;

let pin="1234";

let statement=[];

const screen=document.getElementById("screen");

welcome();

function welcome(){

screen.innerHTML=`

<h2>🏦 ATM MACHINE</h2>

<p>Insert Card</p>

<button onclick="pinPage()">Continue</button>

`;

}

function pinPage(){

screen.innerHTML=`

<h2>Enter PIN</h2>

<input type="password" id="pin">

<button onclick="checkPin()">Login</button>

`;

}

function checkPin(){

let p=document.getElementById("pin").value;

if(p==pin){

menu();

}
else{

alert("Wrong PIN");

}

}

function menu(){

screen.innerHTML=`

<h2>Main Menu</h2>

<button onclick="withdraw()">Withdraw</button>

<button onclick="deposit()">Deposit</button>

<button onclick="checkBalance()">Check Balance</button>

<button onclick="fastCash()">Fast Cash</button>

<button onclick="miniStatement()">Mini Statement</button>

<button onclick="changePin()">Change PIN</button>

<button onclick="exitATM()">Exit</button>

`;

}

function withdraw(){

screen.innerHTML=`

<h2>Withdraw</h2>

<input type="number" id="amt">

<button onclick="withdrawMoney()">Withdraw</button>

<button onclick="menu()">Back</button>

`;

}

function withdrawMoney(){

let amt=parseInt(document.getElementById("amt").value);

if(amt<=0){

alert("Invalid Amount");

return;

}

if(amt>balance){

alert("Insufficient Balance");

return;

}

balance-=amt;

statement.push("Withdraw : ₹"+amt);

alert("Collect Cash");

menu();

}

function deposit(){

screen.innerHTML=`

<h2>Deposit</h2>

<input type="number" id="dep">

<button onclick="depositMoney()">Deposit</button>

<button onclick="menu()">Back</button>

`;

}

function depositMoney(){

let amt=parseInt(document.getElementById("dep").value);

balance+=amt;

statement.push("Deposit : ₹"+amt);

alert("Money Deposited");

menu();

}

function checkBalance(){

screen.innerHTML=`

<h2>Your Balance</h2>

<h1>₹${balance}</h1>

<button onclick="menu()">Back</button>

`;

}

function fastCash(){

screen.innerHTML=`

<h2>Fast Cash</h2>

<button onclick="fast(500)">₹500</button>

<button onclick="fast(1000)">₹1000</button>

<button onclick="fast(2000)">₹2000</button>

<button onclick="fast(5000)">₹5000</button>

<button onclick="menu()">Back</button>

`;

}

function fast(amount){

if(balance<amount){

alert("Insufficient Balance");

return;

}

balance-=amount;

statement.push("Fast Cash : ₹"+amount);

alert("Collect Cash");

menu();

}

function miniStatement(){

let text="";

if(statement.length==0){

text="No Transactions";

}else{

statement.forEach(s=>{

text+=s+"<br>";

});

}

screen.innerHTML=`

<h2>Mini Statement</h2>

${text}

<br><br>

<button onclick="menu()">Back</button>

`;

}

function changePin(){

screen.innerHTML=`

<h2>Change PIN</h2>

<input type="password" id="newpin">

<button onclick="savePin()">Save</button>

<button onclick="menu()">Back</button>

`;

}

function savePin(){

pin=document.getElementById("newpin").value;

alert("PIN Changed");

menu();

}

function exitATM(){

screen.innerHTML=`

<h2>Thank You</h2>

<p>Please Collect Your Card</p>

<button onclick="welcome()">Restart</button>

`;

}

</script>

</body>
</html>
