<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deposit Cash</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:url("oip.jpg") no-repeat center center fixed;
    background-size:cover;
    font-family:Arial, Helvetica, sans-serif;
}

.card-box{
    width:500px;
    margin:80px auto;
    background:rgba(255,255,255,.9);
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    text-align:center;
}

h1,h2,h3{
    font-weight:bold;
    text-align:center;
}

input{
    text-align:center;
    font-size:20px;
}

button{
    width:100%;
    margin-top:15px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="card-box">

<h1 class="text-primary">Deposit Cash</h1>

<div id="depositForm">

<label class="fw-bold mb-2">Enter Deposit Amount</label>

<input type="number" id="amount" class="form-control" placeholder="Enter Amount">

<button class="btn btn-success" onclick="depositMoney()">
Deposit
</button>

</div>

<div id="successMessage" style="display:none;">

<h2 class="text-success mt-3">
Money Deposited Successfully
</h2>

<h3 id="showAmount" class="mt-4"></h3>

<button class="btn btn-primary mt-3" onclick="goHome()">
Back
</button>

</div>

</div>

<script>

function depositMoney(){

    let amount=document.getElementById("amount").value.trim();

    if(amount=="" || isNaN(amount) || Number(amount)<=0){

        alert("Please enter a valid amount.");
        return;

    }

    document.getElementById("depositForm").style.display="none";

    document.getElementById("successMessage").style.display="block";

    document.getElementById("showAmount").innerHTML=
    "Deposited Amount<br><span style='color:green;'>₹ "+amount+"</span>";

}

function goHome(){

    window.location.href="index.html";

}

</script>

</body>
</html>
