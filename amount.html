<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>
    <style>
body{
    background:url("oip.jpg") no-repeat center center fixed;
    background-size:cover;
    font-family:Arial, Helvetica, sans-serif;
}

.card-box{
    width:500px;
    margin:80px auto;
    background:url("oip.jpg") no-repeat center center fixed;
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    text-align:center;
}

h1,h2,h3{
    text-align:center;
    font-weight:bold;
    color:#003366;
}

label{
    font-weight:bold;
    margin-bottom:8px;
}

input{
    text-align:center;
}

button{
    width:100%;
    margin-top:20px;
    font-weight:bold;
    font-size:18px;
    padding:10px;
}
</style>
</head>
<body style="background-image: url('oip.jpg'); background-size: cover; background-repeat: no-repeat; background-attachment: fixed;">
    <div class="container card-box" style="text-align: center;">
        <div class="row">
            <h1>Welcome to ATM </h1>    
        </div>
        <div class="row">
            <div class="col-3"></div>
            <div class="col-6">
                <label for="b1">Enter Amount</label>
                <input type="text" name="b1" id="b1" placeholder="enter amount">
            </div>
            <div class="col-3"></div>
        </div>
            <button onclick="processTransaction()">Continue</button>
        </div>
    </div>
    <script>
       function processTransaction(){
        let amount=parseFloat(document.getElementById("b1").value);
        if(isNaN(amount) || amount<=0){
        alert("Please Enter Valid Amount");
        return;
        }
        if(amount>10000){
        alert("Maximum Withdrawal Limit is ₹10000");
        return;
        }
        localStorage.setItem("withdrawAmount",amount);
        window.location.href="withdraw.html";
        }
    </script>  
</body>
</html>
