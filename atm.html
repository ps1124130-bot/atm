<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>
    <style>
body{
    background:url("oip.jpg") no-repeat center center fixed;
    background-size:cover;
    font-family:Arial, Helvetica, sans-serif;
}

.card-box{
    width:500px;
    margin:80px auto;
    background:rgba(255,255,255,.90);
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    text-align:center;
}

h1,h2,h3{
    text-align:center;
    font-weight:bold;
    color:#003366;
}

label{
    font-weight:bold;
    margin-bottom:8px;
}

input{
    text-align:center;
}

button{
    width:100%;
    margin-top:20px;
    font-weight:bold;
    font-size:18px;
    padding:10px;
}
</style>
</head>
<body>
    <div class="row">
        <div class="col-12">
            <h1>ATM</h1>
        </div>
    </div>
    <div class="row" style="margin-bottom: 10px;">
        <div class="col-12">
            <label for="value1">Enter Your Name</label>
            <input type="text" name="value1" id="value1" placeholder="Enter Your Name">
        </div>
    </div>
    <div class="row" style="margin-bottom: 10px;">
        <div class="col-12">
            <label for="value">Enter your amount to withdraw</label>
            <input type="text" name="value" id="value" placeholder="Enter your amount"> 
        </div>
    </div>
    <div class="row" style="margin-bottom: 10px;">
        <div class="col-12">
            <label for="pin1">Enter your Pin to withdraw</label>
            <input type="text" name="pin1" id="pin1" placeholder="Enter your pin">
        </div>
    </div>
    <button type="button" onclick="checkPin()" style="margin-bottom: 10px;">Check Pin</button>
    <script>
        const val=document.getElementById("pin1");
        const pin="1234";
        function checkPin() {
            if(val.value === pin){
                console.log("You can withdraw");
            } else {
                console.log("You cannot withdraw");
            }
        }
    </script>
</body>
</html>
