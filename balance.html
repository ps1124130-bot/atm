<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Check Balance</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:url("oip.jpg") no-repeat center center fixed;
    background-size:cover;
    font-family:Arial, Helvetica, sans-serif;
}

.card-box{
    width:550px;
    margin:80px auto;
    background:rgba(255,255,255,.92);
    padding:35px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    text-align:center;
}

h1,h2,h3{
    font-weight:bold;
    text-align:center;
}

#balance{
    color:green;
    font-size:45px;
    margin-top:20px;
}

button{
    width:100%;
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="card-box">

<h1 class="text-primary">
Welcome to SBI ATM Bank
</h1>

<hr>

<h2 class="text-success">
Your Current Balance
</h2>

<h1 id="balance"></h1>

<button class="btn btn-primary" onclick="refreshBalance()">
Refresh Balance
</button>

<button class="btn btn-success" onclick="goHome()">
Back to SBI Home
</button>

</div>

<script>

// Set initial balance only once
if(localStorage.getItem("balance")==null){

    localStorage.setItem("balance",100000);

}

// Show balance
function refreshBalance(){

    let balance=Number(localStorage.getItem("balance"));

    document.getElementById("balance").innerHTML=
    "₹ "+balance.toLocaleString("en-IN");

}

// Back to SBI page
function goHome(){

    window.location.href="sbi.html";

}

// Show balance automatically when page loads
refreshBalance();

</script>

</body>
</html>
